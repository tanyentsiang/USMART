<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RM Dashboard</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <style>
        /* Base Layout: Full screen, no scrolling on the body */
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f4f6f9;
            margin: 0;
            color: #333;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* LEFT PANEL: 7 parts (70% width) */
        .left-panel {
            flex: 7;
            padding: 30px;
            overflow-y: auto; /* Allows scrolling only on the left side */
            box-sizing: border-box;
        }

        /* RIGHT PANEL: 3 parts (30% width) */
        .right-panel {
            flex: 3;
            background: #ffffff;
            padding: 20px;
            box-shadow: -4px 0 20px rgba(0,0,0,0.05);
            display: flex;
            flex-direction: column; /* Stacks text area and buttons vertically */
            box-sizing: border-box;
            border-left: 1px solid #eaeaea;
            position: relative;
        }

        /* Left Panel Content Styling */
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }
        h2 { font-size: 18px; margin-top: 0; color: #1a1a1a; }
        .subtitle { font-size: 11px; color: #666; margin-top: -10px; margin-bottom: 15px; font-weight: 500; }
        .search-bar { width: 100%; padding: 12px; border: 1px solid #e0e0e0; border-radius: 6px; box-sizing: border-box; font-size: 14px; margin-bottom: 15px; outline: none; }
        .search-bar:focus { border-color: #007bff; }
        .category-container { margin-bottom: 20px; }
        .category-title { font-size: 11px; font-weight: bold; color: #007bff; text-transform: uppercase; letter-spacing: 0.5px; margin-top: 15px; margin-bottom: 8px; border-bottom: 1px solid #eef2f5; padding-bottom: 4px; }
        .faq-item { display: flex; align-items: center; justify-content: space-between; background: #f8f9fa; padding: 12px; border-radius: 8px; margin-bottom: 8px; border: 1px solid #eaeaea; transition: background-color 0.2s; }
        .faq-item:hover { background: #f0f4f8; }
        .faq-info { flex-grow: 1; padding-right: 15px; overflow: hidden; }
        .faq-title { font-size: 13px; font-weight: 600; margin-bottom: 3px; }
        .faq-preview { font-size: 11px; color: #666; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        
        /* Buttons inside the FAQ List */
        .btn-group { display: flex; gap: 6px; }
        .add-btn { background-color: #e7f1ff; color: #007bff; border: 1px solid #b8daff; padding: 8px 10px; font-size: 11px; font-weight: bold; border-radius: 6px; cursor: pointer; white-space: nowrap; }
        .add-btn.cn-btn { background-color: #f3f0fa; color: #6f42c1; border-color: #d6cce9; }
        .add-btn:hover { filter: brightness(0.95); }
        .loading-state { text-align: center; padding: 40px; color: #666; font-size: 13px; background: #f8f9fa; border-radius: 8px; border: 1px dashed #ccc; }

        /* Right Panel Builder Styling */
        .builder-textarea { 
            width: 100%; 
            flex-grow: 1; /* Makes the textarea fill all available vertical space */
            border: 1px solid #ccc; 
            border-radius: 6px; 
            padding: 15px; 
            box-sizing: border-box; 
            font-family: inherit; 
            font-size: 13px; 
            line-height: 1.5;
            resize: none; 
            outline: none; 
            margin-bottom: 15px;
        }
        .builder-textarea:focus { border-color: #28a745; }
        .builder-actions { display: flex; gap: 10px; width: 100%; }
        .action-btn { flex: 1; padding: 12px; font-size: 13px; font-weight: bold; border-radius: 6px; cursor: pointer; border: none; transition: opacity 0.2s; }
        .action-btn:hover { opacity: 0.9; }
        .clear-btn { background-color: #6c757d; color: white; }
        .main-copy-btn { background-color: #28a745; color: white; }

        /* Notification Toast */
        .notification { position: absolute; bottom: 80px; left: 50%; transform: translateX(-50%); background: #323232; color: white; padding: 10px 20px; border-radius: 20px; font-size: 13px; display: none; box-shadow: 0 4px 10px rgba(0,0,0,0.2); z-index: 1000; white-space: nowrap; }
    </style>
</head>
<body>

<div class="left-panel">
    <div class="container">
        <h2> Reply Optimisation Dashboard</h2>
        <div class="subtitle">Bilingual Response Matrix | Architecture: Google Sheets Cloud Sync</div>
        <input type="text" id="searchBox" class="search-bar" placeholder="Search matrices or keywords (e.g., funding, 入金, options)..." onkeyup="filterFAQ()">
        <div id="faq-container">
            <div class="loading-state">⏳ Connecting to Google Sheets database... Fetching latest operations matrices...</div>
        </div>
    </div>
</div>

<div class="right-panel">
    <textarea id="draftArea" class="builder-textarea" placeholder="Click 'Add' buttons to load reply templates and edit your response here..."></textarea>
    <div class="builder-actions">
        <button class="action-btn clear-btn" onclick="clearDraft()">Clear / 清空</button>
        <button class="action-btn main-copy-btn" id="mainCopyBtn" onclick="copyCombinedText()">Copy / 复制</button>
    </div>
    <div id="toast" class="notification">Message copied!</div>
</div>

<script>
    const GOOGLE_SHEET_CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSISRkhSHWqmmznY8UFaQ9jh-OFA8FH39K701TYyZ7rUMVt-NbE390axbVmXtN3hqJhGSRNjgVu4VrB/pub?output=csv";

    window.onload = function() {
        Papa.parse(GOOGLE_SHEET_CSV_URL, {
            download: true,
            header: true,
            skipEmptyLines: true,
            complete: function(results) {
                if (results.data.length > 0) {
                    buildDashboard(results.data);
                } else {
                    document.getElementById('faq-container').innerHTML = '<div class="loading-state">No data found in your Google Sheet.</div>';
                }
            },
            error: function(error) {
                document.getElementById('faq-container').innerHTML = '<div class="loading-state" style="color: #d64545;"><strong>Sync Error:</strong> Failed to load data. Ensure sheet is published as CSV.</div>';
            }
        });
    };

    function buildDashboard(data) {
        const container = document.getElementById('faq-container');
        container.innerHTML = '';
        const categories = {};
        
        data.forEach(row => {
            const catID = row['Category ID'];
            const catName = row['Category Name (Bilingual)'];
            const title = row['FAQ Title'];
            const enReply = row['English Response Template'];
            const cnReply = row['Chinese Response Template'];
            if (!catID || !title) return;
            const groupKey = `${catID}|${catName}`;
            if (!categories[groupKey]) categories[groupKey] = [];
            categories[groupKey].push({ title, en: enReply, cn: cnReply });
        });

        for (const key in categories) {
            const [catID, catName] = key.split('|');
            const items = categories[key];
            const categoryDiv = document.createElement('div');
            categoryDiv.className = 'category-container';
            categoryDiv.innerHTML = `<div class="category-title">${catID}. ${catName}</div>`;
            items.forEach(item => {
                const faqItem = document.createElement('div');
                faqItem.className = 'faq-item';
                faqItem.innerHTML = `
                    <div class="faq-info">
                        <div class="faq-title">${item.title}</div>
                        <div class="faq-preview">${(item.en || '').substring(0, 55)}...</div>
                    </div>
                    <div class="btn-group">
                        <button class="add-btn en-btn">Add EN</button>
                        <button class="add-btn cn-btn">添加中文</button>
                    </div>
                `;
                faqItem.querySelector('.en-btn').onclick = () => appendToDraft(item.en);
                faqItem.querySelector('.cn-btn').onclick = () => appendToDraft(item.cn);
                categoryDiv.appendChild(faqItem);
            });
            container.appendChild(categoryDiv);
        }
    }

    function appendToDraft(text) {
        const draftArea = document.getElementById("draftArea");
        draftArea.value += (draftArea.value ? "\n\n" : "") + (text || "");
    }

    function clearDraft() { document.getElementById("draftArea").value = ""; }

    function copyCombinedText() {
        const text = document.getElementById("draftArea").value.trim();
        if (!text) return alert("Customizer is empty!");
        navigator.clipboard.writeText(text).then(() => {
            const toast = document.getElementById("toast");
            toast.style.display = "block";
            setTimeout(() => { toast.style.display = "none"; }, 1500);
        });
    }

    function filterFAQ() {
        let input = document.getElementById('searchBox').value.toLowerCase();
        Array.from(document.getElementsByClassName('faq-item')).forEach(item => {
            item.style.display = item.innerText.toLowerCase().includes(input) ? "flex" : "none";
        });
    }
</script>
</body>
</html>
