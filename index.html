<script>
    // Make sure this URL is the REPUBLISHED link from your Google Sheet
    const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSISRkhSHWqmmznY8UFaQ9jh-OFA8FH39K701TYyZ7rUMVt-NbE390axbVmXtN3hqJhGSRNjgVu4VrB/pub?output=csv";
    let allData = [];

    window.onload = () => {
        Papa.parse(CSV_URL, {
            download: true, 
            header: true,
            skipEmptyLines: true, // This prevents empty rows from creating broken buttons
            complete: (results) => { 
                allData = results.data; 
                console.log("Data loaded:", allData); // Check your F12 Console to see if the text is there
                renderFAQs(allData); 
            }
        });
    };

    function renderFAQs(data) {
        const container = document.getElementById('faq-container');
        container.innerHTML = '';
        let lastCategory = '';

        data.forEach((row, index) => {
            // Debugging: If title is missing, it skips rendering
            if (!row['FAQ Title']) return;

            if (row['Category Name (Bilingual)'] !== lastCategory) {
                lastCategory = row['Category Name (Bilingual)'];
                container.innerHTML += `<div class="category-title">${lastCategory || "Uncategorized"}</div>`;
            }

            const guideUrl = row['Guide URL'] || row['GuideURL'];
            const guideBtn = (guideUrl && guideUrl.trim().length > 5) 
                ? `<button class="add-btn" style="background:#fff3cd; color:#856404; border-color:#ffeeba;" onclick="window.open('${guideUrl.trim()}', '_blank')">View Guide</button>` 
                : '';

            const div = document.createElement('div');
            div.className = 'faq-item';
            div.innerHTML = `
                <div class="faq-title">${row['FAQ Title']}</div>
                <div class="btn-group">
                    <button class="add-btn" id="en-${index}">Add EN</button>
                    <button class="add-btn" id="cn-${index}" style="background:#f3f0fa; color:#6f42c1;">添加中文</button>
                    ${guideBtn}
                </div>
            `;
            container.appendChild(div);
            
            // Using safe access to row data
            document.getElementById(`en-${index}`).onclick = () => addToDraft(row['English Response Template'] || "");
            document.getElementById(`cn-${index}`).onclick = () => addToDraft(row['Chinese Response Template'] || "");
        });
    }
    
    // ... rest of your functions (addToDraft, clearDraft, copyText) remain the same
</script>
