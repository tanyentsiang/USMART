<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Dashboard</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
</head>
<body>
    <div id="faq-container">Loading...</div>
    <script>
        // Use your direct CSV link
        const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSISRkhSHWqmmznY8UFaQ9jh-OFA8FH39K701TYyZ7rUMVt-NbE390axbVmXtN3hqJhGSRNjgVu4VrB/pub?output=csv";

        Papa.parse(CSV_URL, {
            download: true,
            header: true,
            complete: function(results) {
                const container = document.getElementById('faq-container');
                container.innerHTML = "Dashboard Loaded!";
                console.log("Data loaded:", results.data);
            },
            error: function(err) {
                document.getElementById('faq-container').innerHTML = "Critical Error: " + err;
            }
        });
    </script>
</body>
</html>
