<script>
    const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSISRkhSHWqmmznY8UFaQ9jh-OFA8FH39K701TYyZ7rUMVt-NbE390axbVmXtN3hqJhGSRNjgVu4VrB/pub?output=csv";
    let selectedItems = []; // Stores objects {text: "", imgUrl: ""}

    window.onload = () => {
        Papa.parse(CSV_URL, { download: true, header: true, complete: (res) => buildDashboard(res.data) });
    };

    function buildDashboard(data) {
        const container = document.getElementById('faq-container');
        container.innerHTML = '';
        data.forEach(row => {
            const faqItem = document.createElement('div');
            faqItem.className = 'faq-item';
            faqItem.innerHTML = `
                <div class="faq-title">${row['FAQ Title']}</div>
                ${row.Image ? `<img src="${row.Image}" class="thumb">` : ''}
                <div class="btn-group">
                    <button class="add-btn">Add EN</button>
                    <button class="add-btn" style="background:#f3f0fa; color:#6f42c1;">添加中文</button>
                </div>
            `;
            faqItem.querySelectorAll('button')[0].onclick = () => addToDraft(row['English Response Template'], row.Image);
            faqItem.querySelectorAll('button')[1].onclick = () => addToDraft(row['Chinese Response Template'], row.Image);
            container.appendChild(faqItem);
        });
    }

    function addToDraft(text, imgUrl) {
        const area = document.getElementById("draftArea");
        area.value += (area.value ? "\n\n" : "") + text;
        selectedItems.push({text, imgUrl});
    }

    // The Blob Conversion Logic
    async function copyCombinedText() {
        const text = document.getElementById("draftArea").value;
        const btn = document.getElementById("mainCopyBtn");
        const clipboardItems = {};

        // 1. Add the text data
        clipboardItems["text/plain"] = new Blob([text], { type: "text/plain" });

        // 2. Fetch images and convert to Blobs for the clipboard
        for (const item of selectedItems) {
            if (item.imgUrl) {
                try {
                    const response = await fetch(item.imgUrl);
                    const blob = await response.blob();
                    // We use a unique key for each image
                    clipboardItems[blob.type] = blob;
                } catch (e) { console.error("Image fetch failed", e); }
            }
        }

        try {
            await navigator.clipboard.write([new ClipboardItem(clipboardItems)]);
            btn.innerText = "Copied Text & Images!";
            setTimeout(() => btn.innerText = "Copy Text + Images", 2000);
        } catch (e) {
            alert("Clipboard copy failed. Please ensure images are public URLs.");
        }
    }
</script>
