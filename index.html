<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Operations Dashboard</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, sans-serif; background-color: #f4f6f9; padding: 20px; padding-bottom: 250px; color: #333; margin: 0; }
        .container { max-width: 650px; margin: 0 auto; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        h2 { font-size: 18px; margin-top: 0; color: #1a1a1a; }
        .search-bar { width: 100%; padding: 10px; margin-bottom: 20px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; font-size: 14px; }
        .category-title { font-size: 11px; font-weight: bold; color: #007bff; text-transform: uppercase; margin: 15px 0 8px; border-bottom: 1px solid #eef2f5; padding-bottom: 4px; }
        .faq-item { background: #f8f9fa; padding: 12px; border-radius: 8px; margin-bottom: 8px; border: 1px solid #eaeaea; }
        .faq-title { font-size: 13px; font-weight: 600; margin-bottom: 8px; }
        .btn-group { display: flex; gap: 6px; }
        .add-btn { background-color: #e7f1ff; color: #007bff; border: 1px solid #b8daff; padding: 6px 10px; font-size: 11px; font-weight: bold; border-radius: 6px; cursor: pointer; }
        .builder-panel { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 650px; background: #fff; box-shadow: 0 -4px 20px rgba(0,0,0,0.1); padding: 15px; box-sizing: border-box; }
        .builder-textarea { width: 100%; height: 100px; border: 1px solid #ccc; border-radius: 6px; padding: 8px; box-sizing: border-box; resize: vertical; font-family: inherit; }
        .action-group { display: flex; gap: 10px; margin-top: 10px; }
        .btn-action { flex: 1; padding: 10px; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; }
        .clear-btn { background-color: #6c757d; color: white; }
        .copy-btn { background-color: #28a745; color: white; }
    </style>
</head>
<body>

<div class="container">
    <h2>Operations Optimization Dashboard</h2>
    <input type="text" id="searchBar" class="search-bar" placeholder="Search templates..." onkeyup="filterFAQs()">
    <div id="faq-container">Loading templates...</div>
</div>

<div class="builder-panel">
    <textarea id="draftArea" class="builder-textarea" placeholder="Selected replies appear here..."></textarea>
    <div class="action-group">
        <button class="btn-action clear-btn" onclick="clearDraft()">Clear Message</button>
        <button class="btn-action copy-btn" onclick="copyText()">Copy Message</button>
    </div>
</div>

<script>
    // Make sure this is your latest "Published to web" CSV link
    const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSISRkhSHWqmmznY8UFaQ9jh-OFA8FH39K701TYyZ7rUMVt-NbE390axbVmXtN3hqJhGSRNjgVu4VrB/pub?output=csv";
    let allData = [];

    window.onload = () => {
        Papa.parse(CSV_URL, {
            download: true, 
            header: true,
            skipEmptyLines: true, // Prevents blank spreadsheet rows from breaking the script
            complete: (results) => { 
                allData = results.data; 
                renderFAQs(allData); 
            },
            error: (err) => {
                document.getElementById('faq-container').innerHTML = `<div style="color:red; padding:10px;">Failed to load data. Please ensure your Google Sheet is published to the web.</div>`;
            }
        });
    };

    function renderFAQs(data) {
        const container = document.getElementById('faq-container');
        container.innerHTML = '';
        let lastCategory = '';

        if (data.length === 0) {
            container.innerHTML = '<div style="padding:10px;">No templates found.</div>';
            return;
        }

        data.forEach((row, index) => {
            // Ignore rows without a title
            if (!row['FAQ Title'] || row['FAQ Title'].trim() === '') return;

            // Generate Category Headers
            const currentCategory = row['Category Name (Bilingual)'] || 'Uncategorized';
            if (currentCategory !== lastCategory) {
                lastCategory = currentCategory;
                const catDiv = document.createElement('div');
                catDiv.className = 'category-title';
                catDiv.textContent = lastCategory;
                container.appendChild(catDiv);
            }

            // Generate FAQ Buttons
            const div = document.createElement('div');
            div.className = 'faq-item';
            div.innerHTML = `
                <div class="faq-title">${row['FAQ Title']}</div>
                <div class="btn-group">
                    <button class="add-btn" id="en-${index}">Add EN</button>
                    <button class="add-btn" id="cn-${index}" style="background:#f3f0fa; color:#6f42c1;">添加中文</button>
                </div>
            `;
            container.appendChild(div);

            // Attach click events safely
            document.getElementById(`en-${index}`).onclick = () => addToDraft(row['English Response Template'] || "");
            document.getElementById(`cn-${index}`).onclick = () => addToDraft(row['Chinese Response Template'] || "");
        });
    }

    function filterFAQs() {
        const query = document.getElementById('searchBar').value.toLowerCase();
        const filtered = allData.filter(item => {
            const title = item['FAQ Title'] ? item['FAQ Title'].toLowerCase() : '';
            return title.includes(query);
        });
        renderFAQs(filtered);
    }

    function addToDraft(text) {
        const area = document.getElementById("draftArea");
        if (text && text.trim() !== "") {
            area.value += (area.value ? "\n\n" : "") + text;
        }
    }

    function clearDraft() {
        document.getElementById("draftArea").value = "";
    }

    function copyText() {
        const area = document.getElementById("draftArea");
        area.select();
        document.execCommand("copy");
        alert("Message copied to clipboard!");
    }
</script>
</body>
</html>
